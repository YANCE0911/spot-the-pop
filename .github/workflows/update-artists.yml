name: Update Artist Pool

on:
  schedule:
    - cron: '0 15 1 * *' # 毎月1日 0:00 JST (15:00 UTC前日)
  workflow_dispatch: # 手動実行

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Enrich existing artists (update followers/popularity)
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: npx ts-node scripts/enrichArtists.ts

      - name: Expand pool (discover new artists via related + genre)
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: npx ts-node scripts/expandPool.ts

      - name: Discover from playlists (JP playlist crawl)
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: npx ts-node scripts/discoverFromPlaylists.ts

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet lib/JapaneseArtists.ts; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            ARTIST_COUNT=$(grep -c '"id"' lib/JapaneseArtists.ts)
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "count=$ARTIST_COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="feat/update-artists-$(date +%Y%m)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add lib/JapaneseArtists.ts
          git commit -m "feat: update artist pool (${{ steps.changes.outputs.count }} artists)"
          git push origin "$BRANCH"
          gh pr create \
            --title "Update artist pool (${{ steps.changes.outputs.count }} artists)" \
            --body "## Monthly Artist Pool Update

          - Total artists: ${{ steps.changes.outputs.count }}
          - Followers/popularity refreshed
          - New artists discovered via Related Artists + genre search + playlist crawl

          Auto-generated by GitHub Actions." \
            --label "auto-update"
